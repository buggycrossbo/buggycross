  <section class="section">
    <h2>¿Listo para la aventura?</h2>
    <p>Contáctanos y reserva tu vuelta en la pista más extrema de Bolivia.</p>

    <div class="contact-form" style="max-width: 600px; margin: 50px auto;">
      <input type="text" id="nombre" placeholder="Tu nombre" style="width:100%; padding:15px; margin-bottom:15px; background:#222; border:none; color:white;">
      <input type="tel" id="telefono" placeholder="Tu número de WhatsApp" style="width:100%; padding:15px; margin-bottom:15px; background:#222; border:none; color:white;">
      <textarea id="mensaje" placeholder="¿Qué aventura estás buscando?" style="width:100%; padding:15px; height:120px; background:#222; border:none; color:white;"></textarea>
      <button onclick="enviarMensaje()" class="btn-primary" style="width:100%; margin-top:20px;">ENVIAR MENSAJE POR WHATSAPP</button>
    </div>
  </section>

  <script src="script.js"></script>
