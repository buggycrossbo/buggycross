  <section class="section">
    <h2>Contáctanos y Reserva</h2>
    <p>Completa el formulario y te responderemos confirmando tu reserva lo antes posible.</p>

    <form action="https://formspree.io/f/xjglllva" method="POST" class="contact-form">
      <input type="text" name="nombre" placeholder="Tu nombre completo" required>
      <input type="email" name="email" placeholder="Tu correo electrónico" required>
      <input type="tel" name="whatsapp" placeholder="Tu número de WhatsApp" required>
      <input type="number" name="personas" placeholder="Cantidad de personas" min="1" required>
      <textarea name="mensaje" rows="5" placeholder="¿Qué fecha te interesa? ¿Alguna duda o preferencia?" required></textarea>
      
      <button type="submit" class="btn-primary">ENVIAR MENSAJE</button>
    </form>
  </section>

  <script src="script.js"></script>
