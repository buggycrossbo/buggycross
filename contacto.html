<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto - Buggycross Bolivia</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .contact-form {
      max-width: 650px;
      margin: 40px auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .contact-form input,
    .contact-form textarea {
      padding: 16px 18px;
      font-size: 1.1rem;
      background: #1f1f1f;
      border: 1px solid #444;
      border-radius: 8px;
      color: white;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">BUGGYCROSS</div>
    <div class="nav-links">
      <a href="index.html">Inicio</a>
      <a href="quienes-somos.html">Quiénes Somos</a>
      <a href="buggies.html">Nuestros Buggies</a>
      <a href="hidroponia.html">Hidroponía</a>
      <a href="contacto.html">Contacto</a>
    </div>
    <div class="hamburger" onclick="toggleMenu()">☰</div>
  </nav>

  <div class="mobile-menu" id="mobile-menu">
    <a href="index.html">Inicio</a>
    <a href="quienes-somos.html">Quiénes Somos</a>
    <a href="buggies.html">Nuestros Buggies</a>
    <a href="hidroponia.html">Hidroponía</a>
    <a href="contacto.html">Contacto</a>
  </div>

  <section class="section">
    <h2>Contáctanos y Reserva tu Aventura</h2>
    <p>Horario de atención:<br>
    <strong>Miércoles a Viernes:</strong> 15:00 - 18:30<br>
    <strong>Sábados y Domingos:</strong> 09:00 - 17:30<br>
    <strong>Lunes y Martes:</strong> Cerrado</p>

    <form action="https://formspree.io/f/xjglllva" method="POST" class="contact-form" id="reservaForm">
      <input type="text" name="nombre" placeholder="Tu nombre completo" required>
      <input type="email" name="email" placeholder="Tu correo electrónico" required>
      <input type="tel" name="whatsapp" placeholder="Número de WhatsApp" required>
      
      <input type="date" name="fecha" id="fecha" required>
      <input type="time" name="hora" id="hora" required>
      
      <input type="number" name="personas" placeholder="Cantidad de personas" min="1" required>
      
      <textarea name="mensaje" rows="5" placeholder="¿Alguna preferencia o comentario adicional?"></textarea>
      
      <button type="submit" class="btn-primary">ENVIAR SOLICITUD DE RESERVA</button>
    </form>
  </section>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const fechaInput = document.getElementById('fecha');
      const horaInput = document.getElementById('hora');
      
      const today = new Date().toISOString().split('T')[0];
      fechaInput.setAttribute('min', today);

      fechaInput.addEventListener('change', function() {
        const selectedDate = new Date(this.value);
        const day = selectedDate.getDay();   // 0=Domingo, 1=Lunes, 2=Martes, 3=Miércoles...

        if (day === 1 || day === 2) {
          alert("Lo sentimos, no trabajamos los lunes ni martes.");
          this.value = '';
          return;
        }

        if (day >= 3 && day <= 5) {        // Miércoles, Jueves, Viernes
          horaInput.setAttribute('min', '15:00');
          horaInput.setAttribute('max', '18:30');
        } else {                           // Sábado y Domingo
          horaInput.setAttribute('min', '09:00');
          horaInput.setAttribute('max', '17:30');
        }
      });
    });
  </script>
</body>
</html>
