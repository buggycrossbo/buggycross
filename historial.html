<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historial y Control - Buggycross</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; background: #0a0a0a; color: white; padding: 20px; }
    h1 { color: #ff3b00; text-align: center; margin: 20px 0; }
    .section { margin-bottom: 50px; }
    table { width: 100%; max-width: 1100px; margin: 0 auto 30px; border-collapse: collapse; background: #1a1a1a; border-radius: 12px; overflow: hidden; }
    th, td { padding: 14px; text-align: left; border-bottom: 1px solid #333; }
    th { background: #ff3b00; color: white; }
    tr:hover { background: #252525; }
    .active { background: #1e3a1e; }
    .cancelled { color: #ff5252; }
  </style>
</head>
<body>

  <h1>HISTORIAL Y ESTADO ACTUAL</h1>

  <!-- TIMERS ACTIVOS -->
  <div class="section">
    <h2 style="text-align:center; color:#4ade80; margin-bottom:15px;">⏳ TIMERS ACTIVOS EN ESTE MOMENTO</h2>
    <table id="active-table">
      <thead>
        <tr>
          <th>Buggy</th>
          <th>Tiempo Restante</th>
          <th>Usuario</th>
        </tr>
      </thead>
      <tbody id="active-body"></tbody>
    </table>
  </div>

  <!-- HISTORIAL COMPLETO -->
  <div class="section">
    <h2 style="text-align:center; margin-bottom:15px;">📋 HISTORIAL COMPLETO DE ACTIVIDAD</h2>
    <table id="history-table">
      <thead>
        <tr>
          <th>Fecha y Hora</th>
          <th>Buggy</th>
          <th>Usuario</th>
          <th>Acción</th>
          <th>Duración / Tiempo Restante</th>
        </tr>
      </thead>
      <tbody id="history-body"></tbody>
    </table>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDGKDYHEIZKnoppP99TToagTZR24uqbjao",
      authDomain: "buggycross-control.firebaseapp.com",
      databaseURL: "https://buggycross-control-default-rtdb.firebaseio.com",
      projectId: "buggycross-control",
      storageBucket: "buggycross-control.firebasestorage.app",
      messagingSenderId: "580647567200",
      appId: "1:580647567200:web:dffc5a656c0b7b8bdd2805"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function formatDate(ts) {
      const date = new Date(ts);
      return date.toLocaleString('es-BO', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
    }

    // Timers Activos
    db.ref('timers').on('value', (snapshot) => {
      const data = snapshot.val() || {};
      const tbody = document.getElementById('active-body');
      tbody.innerHTML = '';

      let hasActive = false;
      Object.keys(data).forEach(color => {
        const timer = data[color];
        if (timer && timer.endTime) {
          hasActive = true;
          const remaining = Math.max(0, Math.floor((timer.endTime - Date.now()) / 1000));
          const min = Math.floor(remaining / 60);
          const sec = remaining % 60;

          const row = document.createElement('tr');
          row.classList.add('active');
          row.innerHTML = `
            <td><strong>${color}</strong></td>
            <td style="font-size:1.4rem; font-weight:bold;">${min}:${sec < 10 ? '0' : ''}${sec}</td>
            <td>Activo</td>
          `;
          tbody.appendChild(row);
        }
      });

      if (!hasActive) {
        tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; padding:30px;">No hay timers activos en este momento</td></tr>`;
      }
    });

    // Historial Completo
    db.ref('logs').once('value', (snapshot) => {
      const allLogs = [];
      snapshot.forEach(buggySnap => {
        const buggy = buggySnap.key;
        buggySnap.forEach(logSnap => {
          const log = logSnap.val();
          allLogs.push({
            time: log.time,
            buggy: buggy,
            user: log.user || "Desconocido",
            duration: log.duration || "N/A",
            action: log.action || "Activado"
          });
        });
      });

      allLogs.sort((a,b) => b.time - a.time);

      const tbody = document.getElementById('history-body');
      tbody.innerHTML = '';

      allLogs.forEach(log => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${formatDate(log.time)}</td>
          <td><strong>${log.buggy}</strong></td>
          <td>${log.user}</td>
          <td>${log.action}</td>
          <td>${log.duration}</td>
        `;
        tbody.appendChild(row);
      });

      if (allLogs.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:40px;">Aún no hay registros</td></tr>`;
      }
    });
  </script>
</body>
</html>
