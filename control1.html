<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Vueltas - Buggycross</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Montserrat', sans-serif; 
      background: #0a0a0a; 
      color: white; 
      text-align: center; 
      padding: 8px; 
      height: 100vh;
      overflow: hidden;
    }
    h1 { 
      color: #ff3b00; 
      margin: 5px 0 10px; 
      font-size: 1.7rem; 
    }
    .grid { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 8px; 
      height: calc(100vh - 60px);
    }
    .buggy-card {
      padding: 10px 8px;
      border-radius: 10px;
      color: white;
      font-weight: bold;
      display: flex;
      flex-direction: column;
      justify-content: center;
      cursor: pointer;
    }
    .lap-count { 
      font-size: 3rem; 
      font-weight: 900; 
      margin: 4px 0; 
    }
    .btn-vuelta {
      background: #ff3b00;
      color: white;
      border: none;
      padding: 9px;
      font-size: 1rem;
      border-radius: 8px;
      margin-top: 6px;
      cursor: pointer;
    }
    .btn-reset {
      background: #555;
      margin-top: 5px;
      padding: 5px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <h1>CONTROL DE VUELTAS</h1>
  <div class="grid" id="grid"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDGKDYHEIZKnoppP99TToagTZR24uqbjao",
      authDomain: "buggycross-control.firebaseapp.com",
      databaseURL: "https://buggycross-control-default-rtdb.firebaseio.com",
      projectId: "buggycross-control",
      storageBucket: "buggycross-control.firebasestorage.app",
      messagingSenderId: "580647567200",
      appId: "1:580647567200:web:dffc5a656c0b7b8bdd2805"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const buggies = ["Rojo", "Verde", "Azul", "Morado", "Naranja"];

    function createCards() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      buggies.forEach(color => {
        const card = document.createElement('div');
        card.className = 'buggy-card';
        card.style.backgroundColor = getColor(color);
        
        card.innerHTML = `
          <div style="font-size:1.45rem;">${color}</div>
          <div class="lap-count" id="laps-${color}">0</div>
          <div style="font-size:0.85rem; margin-bottom:6px;">Vueltas</div>
          <button class="btn-vuelta" onclick="addLap('${color}')">+1 VUELTA</button>
          <button class="btn-reset" onclick="resetLaps('${color}')">Reiniciar</button>
        `;
        grid.appendChild(card);
      });
    }

    function getColor(c) {
      const map = {Rojo:"#c62828", Verde:"#2e7d32", Azul:"#1565c0", Morado:"#6a1b9a", Naranja:"#ef6c00"};
      return map[c];
    }

    function addLap(color) {
      const ref = db.ref('vueltas/' + color);
      ref.once('value', (snap) => {
        let current = snap.val() || 0;
        ref.set(current + 1);
      });
    }

    function resetLaps(color) {
      if (confirm(`¿Reiniciar ${color}?`)) {
        db.ref('vueltas/' + color).set(0);
      }
    }

    db.ref('vueltas').on('value', (snapshot) => {
      const data = snapshot.val() || {};
      buggies.forEach(color => {
        const lapsEl = document.getElementById(`laps-${color}`);
        if (lapsEl) lapsEl.textContent = data[color] || 0;
      });
    });

    createCards();
  </script>
</body>
</html>
