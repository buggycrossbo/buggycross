<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Tiempos - Buggycross</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: #0a0a0a;
      color: white;
      text-align: center;
      padding: 20px;
    }
    h1 {
      color: #ff3b00;
      margin-bottom: 30px;
      font-size: 2.5rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .buggy-card {
      padding: 40px 20px;
      border-radius: 15px;
      color: white;
      font-size: 1.4rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .buggy-card:hover { transform: scale(1.05); }
    
    .timer { font-size: 2.8rem; margin: 15px 0; }
    .status { font-size: 1.1rem; margin-top: 10px; }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: #1a1a1a;
      padding: 40px;
      border-radius: 15px;
      width: 90%;
      max-width: 400px;
    }
  </style>
</head>
<body>

  <h1>CONTROL DE TIEMPOS</h1>
  <div class="grid" id="grid"></div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <h2 id="modal-title">Seleccionar tiempo</h2>
      <button onclick="startTimer(5)" style="background:#ff3b00; padding:15px 30px; margin:15px; font-size:1.3rem; width:80%; border:none; border-radius:8px; cursor:pointer;">5 Minutos</button>
      <button onclick="startTimer(10)" style="background:#ff3b00; padding:15px 30px; margin:15px; font-size:1.3rem; width:80%; border:none; border-radius:8px; cursor:pointer;">10 Minutos</button>
      <button onclick="closeModal()" style="background:#555; padding:12px 30px; margin-top:20px; font-size:1.1rem;">Cancelar</button>
    </div>
  </div>

  <script>
    const buggies = [
      { color: "Rojo",    bg: "#c62828" },
      { color: "Verde",   bg: "#2e7d32" },
      { color: "Azul",    bg: "#1565c0" },
      { color: "Morado",  bg: "#6a1b9a" },
      { color: "Naranja", bg: "#ef6c00" }
    ];

    let timers = {};

    function createCards() {
      const grid = document.getElementById('grid');
      buggies.forEach(b => {
        const card = document.createElement('div');
        card.className = 'buggy-card';
        card.style.backgroundColor = b.bg;
        card.innerHTML = `
          <div>${b.color}</div>
          <div class="timer" id="timer-${b.color}">Listo</div>
          <div class="status" id="status-${b.color}">Disponible</div>
        `;
        card.onclick = () => openModal(b.color);
        grid.appendChild(card);
      });
    }

    let currentBuggy = '';
    function openModal(color) {
      currentBuggy = color;
      document.getElementById('modal-title').textContent = color;
      document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    function startTimer(minutes) {
      closeModal();
      const endTime = Date.now() + minutes * 60000;
      timers[currentBuggy] = endTime;

      const timerEl = document.getElementById(`timer-${currentBuggy}`);
      const statusEl = document.getElementById(`status-${currentBuggy}`);

      const interval = setInterval(() => {
        const remaining = Math.max(0, Math.floor((endTime - Date.now()) / 1000));
        const min = Math.floor(remaining / 60);
        const sec = remaining % 60;
        timerEl.textContent = `${min}:${sec < 10 ? '0' : ''}${sec}`;

        if (remaining <= 0) {
          clearInterval(interval);
          timerEl.textContent = "¡TIEMPO!";
          statusEl.textContent = "Finalizado";
          playAlarm();
        }
      }, 1000);
    }

    function playAlarm() {
      const audio = new Audio('https://freesound.org/data/previews/276/276951_5121236-lq.mp3');
      audio.play();
      setTimeout(() => audio.play(), 800);
      setTimeout(() => audio.play(), 1600);
    }

    // Iniciar
    createCards();
  </script>
</body>
</html>
