<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Tiempos - Buggycross</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: #0a0a0a;
      color: white;
      text-align: center;
      padding: 20px;
    }
    h1 { color: #ff3b00; margin-bottom: 30px; font-size: 2.5rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 25px;
      max-width: 1600px;
      margin: 0 auto;
    }
    .buggy-card {
      padding: 35px 20px;
      border-radius: 15px;
      color: white;
      font-size: 1.4rem;
      font-weight: bold;
      min-height: 260px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      cursor: pointer;
    }
    .timer { font-size: 3rem; margin: 15px 0; font-weight: 900; }
    .status { font-size: 1.1rem; margin-top: 8px; }
  </style>
</head>
<body>

  <h1>CONTROL DE TIEMPOS</h1>
  <div class="grid" id="grid"></div>

  <!-- Modal -->
  <div class="modal" id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; z-index:1000;">
    <div class="modal-content" style="background:#1a1a1a; padding:40px; border-radius:15px; width:90%; max-width:420px;">
      <h2 id="modal-title" style="margin-bottom:30px;">Seleccionar tiempo</h2>
      
      <button onclick="startTimer(5)" style="background:#ff3b00; padding:18px; margin:10px; font-size:1.4rem; width:85%; border:none; border-radius:8px; cursor:pointer;">5 Minutos</button>
      <button onclick="startTimer(10)" style="background:#ff3b00; padding:18px; margin:10px; font-size:1.4rem; width:85%; border:none; border-radius:8px; cursor:pointer;">10 Minutos</button>
      
      <button id="cancel-timer-btn" onclick="cancelCurrentTimer()" 
              style="background:#d32f2f; padding:16px; margin:15px 10px 10px; font-size:1.3rem; width:85%; border:none; border-radius:8px; cursor:pointer; display:none;">
        CANCELAR TIMER
      </button>
      
      <button onclick="closeModal()" style="background:#555; padding:15px; margin-top:20px; font-size:1.1rem; width:85%; border:none; border-radius:8px;">Cerrar</button>
    </div>
  </div>

  <script>
    const buggies = [
      { color: "Rojo",    bg: "#c62828" },
      { color: "Verde",   bg: "#2e7d32" },
      { color: "Azul",    bg: "#1565c0" },
      { color: "Morado",  bg: "#6a1b9a" },
      { color: "Naranja", bg: "#ef6c00" }
    ];

    let timers = {};
    let currentBuggy = '';

    function createCards() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      buggies.forEach(b => {
        const card = document.createElement('div');
        card.className = 'buggy-card';
        card.style.backgroundColor = b.bg;
        card.innerHTML = `
          <div>${b.color}</div>
          <div class="timer" id="timer-${b.color}">Listo</div>
          <div class="status" id="status-${b.color}">Disponible</div>
        `;
        card.onclick = () => openModal(b.color);
        grid.appendChild(card);
      });
    }

    function openModal(color) {
      currentBuggy = color;
      document.getElementById('modal-title').textContent = color;

      const cancelBtn = document.getElementById('cancel-timer-btn');
      cancelBtn.style.display = timers[color] ? 'block' : 'none';

      document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    function startTimer(minutes) {
      closeModal();
      const endTime = Date.now() + minutes * 60000;
      timers[currentBuggy] = { endTime, interval: null };

      const timerEl = document.getElementById(`timer-${currentBuggy}`);
      const statusEl = document.getElementById(`status-${currentBuggy}`);

      const interval = setInterval(() => {
        const remaining = Math.max(0, Math.floor((endTime - Date.now()) / 1000));
        const min = Math.floor(remaining / 60);
        const sec = remaining % 60;
        timerEl.textContent = `${min}:${sec < 10 ? '0' : ''}${sec}`;

        if (remaining <= 0) {
          clearInterval(interval);
          timerEl.textContent = "¡TIEMPO!";
          statusEl.textContent = "Finalizado";
          playAlarm();
          delete timers[currentBuggy];
        }
      }, 1000);

      timers[currentBuggy].interval = interval;
    }

    function cancelCurrentTimer() {
      if (timers[currentBuggy]) {
        clearInterval(timers[currentBuggy].interval);
        delete timers[currentBuggy];
      }
      document.getElementById(`timer-${currentBuggy}`).textContent = "Listo";
      document.getElementById(`status-${currentBuggy}`).textContent = "Disponible";
      closeModal();
    }

    function playAlarm() {
      const audio = new Audio('https://freesound.org/data/previews/276/276951_5121236-lq.mp3');
      audio.play();
      setTimeout(() => audio.play(), 700);
    }

    createCards();
  </script>
</body>
</html>
